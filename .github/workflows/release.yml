name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    name: Bump version and tag
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.release_commit.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute release version
        id: version
        shell: bash
        run: |
          year=$(date -u +%Y)
          month=$(date -u +%-m)
          day=$(date -u +%-d)
          version="${year}.${month}.${day}-${GITHUB_RUN_NUMBER}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Bump package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Commit version bump
        id: release_commit
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.version.outputs.tag }} [skip ci]"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: git tag "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags

  build:
    name: Build (${{ matrix.label }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            build_command: npx electron-builder --publish never --win nsis --x64
            artifact_glob: build/*.exe
          - label: macos-universal
            os: macos-latest
            build_command: npx electron-builder --publish never --mac dmg --universal
            artifact_glob: build/*.dmg
          - label: linux-x64
            os: ubuntu-latest
            build_command: npx electron-builder --publish never --linux AppImage --x64
            artifact_glob: build/*.AppImage

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate project
        run: npm run check

      - name: Build app sources
        run: npm run build

      - name: Build installers
        run: ${{ matrix.build_command }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.label }}
          path: |
            ${{ matrix.artifact_glob }}
            build/latest*.yml
            build/*.blockmap
          if-no-files-found: warn

  github-release:
    name: Publish GitHub Release
    needs:
      - version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
            release-assets/**/latest*.yml
            release-assets/**/*.blockmap

  npm-publish:
    name: Publish npm package
    needs:
      - version
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build package contents
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
